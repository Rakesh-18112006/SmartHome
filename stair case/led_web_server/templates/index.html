<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staircase Lighting Engine</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>Staircase Engine</h1>
    <div class="indicators">
        <span id="stateBadge" class="badge badge-idle">IDLE</span>
        <span id="mqttBadge" class="badge badge-err">MQTT DISCONNECTED</span>
    </div>
</div>

<div class="grid">
    <!-- LEFT: VISUALIZER -->
    <div class="panel">
        <h3>Steps</h3>
        <div class="staircase">
            {% for i in range(total_steps, 0, -1) %}
            <div class="step-row">
                <div class="step-label">{{ i }}</div>
                <div class="step-bar-wrap">
                    <div class="step-bar" id="bar_{{ i }}"></div>
                    <div class="step-pct" id="pct_{{ i }}">0%</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="panel">
        <h3>Animation</h3>
        <div class="btn-grid">
            <button class="btn btn-up" onclick="trigger('UP')">▲ Walk UP</button>
            <button class="btn btn-down" onclick="trigger('DOWN')">▼ Walk DOWN</button>
            <button class="btn btn-off" onclick="trigger('OFF_UP')">Off ▲</button>
            <button class="btn btn-off" onclick="trigger('OFF_DOWN')">Off ▼</button>
            <button class="btn btn-emergency" onclick="trigger('EMERGENCY_OFF')">⚡ EMERGENCY STOP</button>
        </div>

        <h3>Tuning</h3>
        <div class="slider-group">
            <label>Max Brightness <span id="v_maxBrightness">255</span></label>
            <input type="range" class="setting-slider" id="s_maxBrightness" data-key="maxBrightness"
                   min="10" max="255" value="255" oninput="onSlider(this)">
        </div>
        <div class="slider-group">
            <label>Fade Time (s) <span id="v_fadeTime">0.8</span></label>
            <input type="range" class="setting-slider" id="s_fadeTime" data-key="fadeTime"
                   min="0.1" max="5.0" step="0.1" value="0.8" oninput="onSlider(this)">
        </div>
        <div class="slider-group">
            <label>Step Gap (s) <span id="v_stepGap">0.25</span></label>
            <input type="range" class="setting-slider" id="s_stepGap" data-key="stepGap"
                   min="0.05" max="3.0" step="0.05" value="0.25" oninput="onSlider(this)">
        </div>
        <div class="slider-group">
            <label>FPS <span id="v_fps">30</span></label>
            <input type="range" class="setting-slider" id="s_fps" data-key="fps"
                   min="5" max="60" value="30" oninput="onSlider(this)">
        </div>
        <div class="slider-group">
            <label>Auto-Off (s) <span id="v_autoOffTimeout">20</span></label>
            <input type="range" class="setting-slider" id="s_autoOffTimeout" data-key="autoOffTimeout"
                   min="5" max="120" value="20" oninput="onSlider(this)">
        </div>

        <h3>MQTT Log</h3>
        <div class="log-box" id="logBox"></div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
